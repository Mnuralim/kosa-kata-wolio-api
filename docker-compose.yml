networks:
  kosa-kata-wolio-net:
    external: true

services:
  api:
    build: .
    container_name: kosa-kata-wolio-api
    restart: unless-stopped
    networks:
      - kosa-kata-wolio-net
    ports:
      - "${API_PORT:-5005}:5005"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: "5005"
      APP_NAME: kosa-kata-wolio-api
      DATABASE_URL: "mysql://${DATABASE_USER:-root}:${DATABASE_PASSWORD}@${DATABASE_HOST}:${DATABASE_PORT:-3306}/${DATABASE_NAME:-kosa_kata_wolio}?allowPublicKeyRetrieval=true"
      DATABASE_HOST: ${DATABASE_HOST}
      DATABASE_PORT: ${DATABASE_PORT:-3306}
      DATABASE_USER: ${DATABASE_USER:-root}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME:-kosa_kata_wolio}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8081}
      IMAGEKIT_PUBLIC_KEY: ${IMAGEKIT_PUBLIC_KEY}
      IMAGEKIT_PRIVATE_KEY: ${IMAGEKIT_PRIVATE_KEY}
      IMAGEKIT_URL_ENDPOINT: ${IMAGEKIT_URL_ENDPOINT}
